<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>LuxeMarket — Premium Shopping</title>
    <meta name="description" content="Discover thousands of premium products across electronics, fashion, home decor and more. Fast delivery, guaranteed quality." />
    <meta name="keywords" content="shopping, electronics, fashion, home decor, luxury, ecommerce" />
    <meta name="author" content="LuxeMarket" />
    <meta name="theme-color" content="#22c55e" />

    <!-- Favicon — inline SVG logo (no file needed) -->

      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2322c55e'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia%2C serif' font-weight='700' font-size='36' fill='%230b1120'%3EL%3C/text%3E%3C/svg%3E"
    />

    <!-- Apple touch icon -->
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2322c55e'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia%2C serif' font-weight='700' font-size='36' fill='%230b1120'%3EL%3C/text%3E%3C/svg%3E"
    />

    <!-- Open Graph (for link previews on WhatsApp, Twitter etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="LuxeMarket — Premium Shopping" />
    <meta property="og:description" content="Discover thousands of premium products. Fast delivery, guaranteed quality." />
    <meta property="og:site_name"   content="LuxeMarket" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="LuxeMarket — Premium Shopping" />
    <meta name="twitter:description" content="Discover thousands of premium products. Fast delivery, guaranteed quality." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"

    />
